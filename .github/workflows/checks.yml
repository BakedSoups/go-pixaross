name: checks

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/game

      - name: Static lint
        run: go run github.com/go-critic/go-critic/cmd/gocritic@latest check -enable='#diagnostic' ./...

      - name: Duplicate-code check
        run: go run github.com/mibk/dupl@latest -threshold 80 ./cmd ./internal
